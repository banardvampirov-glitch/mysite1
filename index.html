<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fenkik</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #000;
            font-family: 'Press Start 2P', monospace;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==================== ВИДЕО ФОН ==================== */
        #bgVideo {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .bg-dark {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(30,30,30,0.6) 50%, rgba(0,0,0,0.7) 100%);
        }

        /* ==================== INTRO OVERLAY ==================== */
        #overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            animation: introFadeIn 0.5s ease-out;
        }

        @keyframes introFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #overlay.hide {
            opacity: 0;
            pointer-events: none;
        }

        .intro-wrapper {
            text-align: center;
            z-index: 10;
            animation: introZoomIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes introZoomIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ==================== CLICK С ЭФФЕКТОМ ==================== */
        .intro-text {
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 4px;
            text-transform: uppercase;
            position: relative;
            animation: clickPulse 2s ease-in-out infinite;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.3),
                0 0 20px rgba(255, 255, 255, 0.1);
        }

        @keyframes clickPulse {
            0% {
                opacity: 1;
                text-shadow: 
                    0 0 10px rgba(255, 255, 255, 0.3),
                    0 0 20px rgba(255, 255, 255, 0.1),
                    0 0 30px rgba(255, 255, 255, 0);
            }
            50% {
                opacity: 0;
                text-shadow: 
                    0 0 10px rgba(255, 255, 255, 0),
                    0 0 20px rgba(255, 255, 255, 0),
                    0 0 30px rgba(255, 255, 255, 0);
            }
            100% {
                opacity: 1;
                text-shadow: 
                    0 0 10px rgba(255, 255, 255, 0.3),
                    0 0 20px rgba(255, 255, 255, 0.1),
                    0 0 30px rgba(255, 255, 255, 0);
            }
        }

        /* Неоновый эффект */
        .intro-text::before {
            content: 'CLICK';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: #00ff00;
            opacity: 0;
            text-shadow: 0 0 10px #00ff00;
            animation: neonFlicker 2s ease-in-out infinite;
            filter: blur(0.5px);
        }

        @keyframes neonFlicker {
            0% {
                opacity: 0;
                text-shadow: 0 0 5px #00ff00;
            }
            45% {
                opacity: 0;
                text-shadow: 0 0 5px #00ff00;
            }
            49% {
                opacity: 0.8;
                text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            }
            50% {
                opacity: 0;
                text-shadow: 0 0 5px #00ff00;
            }
            100% {
                opacity: 0;
                text-shadow: 0 0 5px #00ff00;
            }
        }

        /* Второй неоновый слой */
        .intro-text::after {
            content: 'CLICK';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: #ff0080;
            opacity: 0;
            text-shadow: 0 0 10px #ff0080;
            animation: neonFlickerPink 2s ease-in-out infinite;
            filter: blur(0.5px);
        }

        @keyframes neonFlickerPink {
            0% {
                opacity: 0;
                text-shadow: 0 0 5px #ff0080;
            }
            48% {
                opacity: 0;
                text-shadow: 0 0 5px #ff0080;
            }
            52% {
                opacity: 0.6;
                text-shadow: 0 0 10px #ff0080, 0 0 20px #ff0080;
            }
            56% {
                opacity: 0;
                text-shadow: 0 0 5px #ff0080;
            }
            100% {
                opacity: 0;
                text-shadow: 0 0 5px #ff0080;
            }
        }

        /* ==================== ОСНОВНОЙ КОНТЕЙНЕР ==================== */
        .container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            width: 100%;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            animation: containerSlideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes containerSlideIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== КАРТОЧКА (ПАНЕЛЬКА) ==================== */
        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(255, 255, 255, 0.08);
            padding: 30px 25px;
            position: relative;
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%, rgba(0,0,0,0.1) 100%);
            pointer-events: none;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 60px rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
        }

        .card-inner {
            position: relative;
            z-index: 1;
        }

        /* ==================== ПРОФИЛЬ ==================== */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 18px;
        }

        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            filter: grayscale(60%) contrast(1.1);
            transition: all 0.4s ease;
            image-rendering: pixelated;
        }

        .avatar:hover {
            filter: grayscale(20%) contrast(1.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .username {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .username:hover {
            letter-spacing: 3px;
        }

        .bio {
            font-size: 7px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            line-height: 2;
            text-transform: uppercase;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            margin: 3px auto;
        }

        /* ==================== ТЕЛЕГРАМ КНОПКА ==================== */
        .tg-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            font-size: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .tg-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .tg-link:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .tg-link:hover::before {
            transform: translateX(100%);
        }

        .tg-icon {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        /* ==================== ПЛЕЕР ==================== */
        .player-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .track-title {
            font-size: 10px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: titleFlicker 3s ease-in-out infinite;
        }

        @keyframes titleFlicker {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* ПРОГРЕСС БАР */
        .progress-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .progress-bar {
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            cursor: pointer;
            position: relative;
            border-radius: 1px;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .progress-bar:hover {
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0.4), rgba(255,255,255,0.9), rgba(255,255,255,0.4));
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 7px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.5px;
        }

        /* КОНТРОЛЫ */
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 10px 0;
        }

        .btn-control {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.7);
            width: 36px;
            height: 36px;
            border-radius: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .btn-control:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .btn-control:active {
            transform: scale(0.95);
        }

        .btn-control svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* ==================== ГРОМКОСТЬ МИНИМАЛЬНАЯ ==================== */
        .volume-minimal {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .vol-icon {
            width: 12px;
            height: 12px;
            fill: rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            cursor: pointer;
            border-radius: 1px;
            transition: all 0.2s ease;
        }

        .volume-slider:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 7px;
            height: 7px;
            background: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            background: #fff;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
        }

        .volume-slider::-moz-range-thumb {
            width: 7px;
            height: 7px;
            background: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            border-radius: 50%;
            border: none;
            transition: all 0.2s ease;
        }

        .volume-slider::-moz-range-thumb:hover {
            background: #fff;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
        }

        audio { display: none; }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 650px) {
            .container {
                max-width: 100%;
                padding: 20px 12px;
                gap: 15px;
            }

            .card {
                padding: 20px 15px;
            }

            .avatar-container {
                width: 85px;
                height: 85px;
            }

            .username {
                font-size: 12px;
            }

            .intro-text {
                font-size: 32px;
                letter-spacing: 2px;
            }

            .controls-wrapper {
                gap: 15px;
            }

            .btn-control {
                width: 32px;
                height: 32px;
            }

            .volume-slider {
                width: 60px;
            }
        }
    </style>
</head>
<body>

    <!-- ВИДЕО ФОН -->
    <video id="bgVideo" muted playsinline src="video.mp4" loop></video>
    <div class="bg-dark"></div>

    <!-- INTRO OVERLAY -->
    <div id="overlay">
        <div class="intro-wrapper">
            <div class="intro-text">CLICK</div>
        </div>
    </div>

    <!-- КОНТЕНТ -->
    <div class="container">

        <!-- ПРОФИЛЬ КАРТОЧКА -->
        <div class="card">
            <div class="card-inner profile-section">
                <div class="avatar-container">
                    <img class="avatar" src="avatar.jpg" alt="fenkik">
                </div>

                <div class="username">fenkik</div>
                <div class="divider"></div>
                <div class="bio">screenShare<br>is my hobby</div>

                <a class="tg-link" href="https://t.me/bogopodobniiiy" target="_blank">
                    <svg class="tg-icon" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8-1.68 7.93c-.12.57-.46.71-.93.44l-2.57-1.89-1.24 1.19c-.14.14-.25.25-.51.25l.18-2.62 4.72-4.27c.21-.18-.04-.28-.31-.1L7.91 14.5 5.37 13.7c-.55-.17-.56-.55.12-.82l8.54-3.3c.46-.17.86.11.61.82z"/>
                    </svg>
                    <span>telegram</span>
                </a>
            </div>
        </div>

        <!-- ПЛЕЕР КАРТОЧКА -->
        <div class="card">
            <div class="card-inner player-section">
                <div class="track-title">???</div>

                <div class="progress-wrap">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-info">
                        <span id="currentTime">00:00</span>
                        <span id="totalTime">00:00</span>
                    </div>
                </div>

                <div class="controls-wrapper">
                    <button class="btn-control" id="prevBtn" title="Skip -5s">
                        <svg viewBox="0 0 24 24">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>

                    <button class="btn-control" id="playBtn" title="Play/Pause">
                        <svg id="playIcon" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>

                    <button class="btn-control" id="nextBtn" title="Skip +5s">
                        <svg viewBox="0 0 24 24">
                            <path d="M16 18h2V6h-2zm-11-7l8.5-6v12z"/>
                        </svg>
                    </button>
                </div>

                <div class="volume-minimal">
                    <svg class="vol-icon" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="1">
                </div>
            </div>
        </div>

    </div>

    <!-- АУДИО -->
    <audio id="audio" src="song.mp3"></audio>

    <script>
        const overlay = document.getElementById('overlay');
        const audio = document.getElementById('audio');
        const video = document.getElementById('bgVideo');
        const playIcon = document.getElementById('playIcon');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeSlider = document.getElementById('volumeSlider');

        let isPlaying = false;
        let entered = false;

        // INTRO - ЛЕВАЯ КНОПКА МЫШИ
        overlay.addEventListener('mousedown', (e) => {
            if (!entered && e.button === 0) { // 0 = левая кнопка мыши
                entered = true;
                overlay.classList.add('hide');
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 1200);

                video.play().catch(() => {});
                audio.play().catch(() => {});
                isPlaying = true;
                updatePlayIcon();
            }
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function togglePlay() {
            if (!entered) return;
            if (isPlaying) {
                audio.pause();
                video.pause();
            } else {
                audio.play().catch(() => {});
                video.play().catch(() => {});
            }
            isPlaying = !isPlaying;
            updatePlayIcon();
        }

        function updatePlayIcon() {
            if (isPlaying) {
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        }

        playBtn.addEventListener('click', togglePlay);

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            audio.currentTime = 0;
            audio.play().catch(() => {});
            if (video.duration) {
                video.currentTime = 0;
                video.play().catch(() => {});
            }
        });

        video.addEventListener('ended', () => {
            video.currentTime = 0;
            video.play().catch(() => {});
        });

        progressBar.addEventListener('click', (e) => {
            if (!audio.duration) return;
            const rect = progressBar.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
            if (video.duration) video.currentTime = pct * video.duration;
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
        });

        prevBtn.addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 5);
            if (video.duration) video.currentTime = Math.max(0, video.currentTime - 5);
        });

        nextBtn.addEventListener('click', () => {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
            if (video.duration) video.currentTime = Math.min(video.duration, video.currentTime + 5);
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>

</body>
</html>
